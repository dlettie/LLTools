<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLTools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f7f8fa;
  --surface: #ffffff;
  --border:  #e7e9ef;
  --text:    #1a1d29;
  --muted:   #6b7280;
  --accent:  #14b8a6;
  --sans:    'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.wrap { width: 100%; max-width: 640px; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
.sub { color: var(--muted); margin-bottom: 28px; font-size: .95rem; }
.card-list { display: flex; flex-direction: column; gap: 12px; }
a.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  text-decoration: none;
  color: inherit;
  transition: border-color .15s ease, transform .15s ease;
}
a.card:hover { border-color: var(--accent); transform: translateY(-1px); }
.card-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
.card-desc { color: var(--muted); font-size: .88rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>LLTools</h1>
  <p class="sub">Pick a tool to open.</p>
  <div class="card-list">
    <a class="card" href="Lift Tool/dataset-mapper.html">
      <div class="card-title">Dataset Mapper</div>
      <div class="card-desc">DemandGen dataset mapping tool.</div>
    </a>
  </div>
</div>
</body>
</html>
